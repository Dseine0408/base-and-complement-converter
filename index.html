<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Converter</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
            --success: #27ae60;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 50px 15px 40px 15px;
            margin: 0;
            position: relative;
        }
        
        .lang-btn {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            padding: 5px 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.8em;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: 0.2s;
            z-index: 10;
        }
        .lang-btn:hover { background-color: #1a252f; }
        
        .main-container { width: 100%; max-width: 800px; }
        
        .tab-nav {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: nowrap;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 5px;
            font-size: 1.05em;
            font-weight: bold;
            background-color: #e0e6ed;
            color: var(--primary);
            border: none;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            word-break: keep-all;
        }
        .tab-btn.active {
            background-color: var(--card-bg);
            color: var(--secondary);
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
            border-top: 4px solid var(--secondary);
        }
        .tab-btn:hover:not(.active) { background-color: #d1d8e0; }
        
        .panel {
            background-color: var(--card-bg);
            padding: 25px 20px;
            border-radius: 0 12px 12px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        .panel.active { display: block; }
        
        h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            font-size: 1.4em;
        }
        
        .input-group {
            display: flex;
            flex-wrap: nowrap;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .input-group > * { flex: 1 1 auto; }
        .input-group input {
            padding: 14px 10px;
            font-size: 16px;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            width: 100%;
            font-weight: bold;
            font-size: 1.2em;
            letter-spacing: 2px;
            text-align: center;
        }
        .input-group input:focus { border-color: var(--secondary); }
        
        .base-select-group {
            display: flex;
            gap: 6px;
            margin: 0 auto 15px auto;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 340px;
        }
        .base-select-group select {
            flex: 1;
            padding: 10px 5px;
            font-size: 15px;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            text-align: center;
            text-align-last: center;
        }
        .base-select-group select:focus { border-color: var(--secondary); }

        .action-group {
            display: flex;
            flex-direction: row;
            gap: 10px;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            align-items: stretch;
        }
        .action-group button, .action-group input {
            padding: 14px 10px;
            font-size: 1.05em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .btn-action { background-color: var(--secondary); color: white; flex: 2; cursor: pointer; transition: 0.2s; }
        .btn-action:hover { background-color: #2980b9; transform: translateY(-2px); }
        .btn-action:active { transform: translateY(0); }
        
        .btn-random { background-color: #f39c12; color: white; flex: 1; cursor: pointer; transition: 0.2s; }
        .btn-random:hover { background-color: #d68910; transform: translateY(-2px); }
        .btn-random:active { transform: translateY(0); }

        .single-action-group { display: flex; justify-content: center; margin-bottom: 20px; }
        .single-action-group .btn-action { flex: none; width: 100%; max-width: 300px; padding: 12px 20px; }

        .smooth-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.5s cubic-bezier(0.4, 0, 0.2, 1), margin-top 0.5s ease-out, opacity 0.5s ease-out;
            margin-top: 0;
            opacity: 0;
        }
        .smooth-wrapper.expanded { grid-template-rows: 1fr; margin-top: 20px; opacity: 1; }
        .smooth-inner { overflow: hidden; padding-top: 1px; padding-bottom: 1px; }

        .result-box {
            padding: 20px;
            background: linear-gradient(135deg, #e8f6f3, #d1f2eb);
            border-radius: 10px;
            font-size: 1.3em;
            text-align: center;
            font-weight: bold;
            color: #117864;
            word-break: break-all;
        }
        .explanation-box {
            padding: 20px;
            background-color: #fafbfc;
            border: 1px solid #dcdde1;
            border-radius: 12px;
            line-height: 1.7;
            word-break: break-all;
        }
        
        .step-title {
            color: #2980b9;
            margin-top: 15px;
            margin-bottom: 10px;
            background-color: #eaf2f8;
            padding: 8px 12px;
            border-radius: 6px;
            display: inline-block;
            font-weight: bold;
        }
        .table-responsive { width: 100%; overflow-x: auto; margin: 15px 0; -webkit-overflow-scrolling: touch; }
        .data-table { width: 100%; border-collapse: collapse; text-align: center; background: white; min-width: 280px; }
        .data-table th, .data-table td { border: 1px solid #dcdde1; padding: 10px; }
        .data-table th { background-color: #f1f2f6; color: var(--primary); }
        .data-table .highlight-text { font-weight: bold; color: var(--accent); font-size: 1.2em; }
        
        .direct-box { display: flex; flex-direction: column; align-items: center; gap: 15px; margin: 20px 0; font-size: 1.1em; font-family: monospace; }
        .bit-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; width: 100%; }
        .bit-group { display: inline-block; padding: 8px 10px; background: #fff3cd; border: 2px solid #f1c40f; border-radius: 8px; font-weight: bold; color: #d35400; }
        .arrow-down { color: var(--secondary); font-size: 1.5em; text-align: center; }
        
        .math-table { border-collapse: collapse; font-family: monospace; font-size: 1.2em; margin: 0 auto; }
        .math-table td { padding: 4px 6px; }
        .math-border { border-left: 2px solid var(--primary); border-bottom: 2px solid var(--primary); text-align: right; padding-right: 12px !important; padding-left: 8px !important; min-width: 40px; }
        .remainder { color: var(--accent); padding-left: 15px !important; font-weight: bold; }
        .final-quotient { color: var(--success); font-weight: bold; text-align: right; padding-right: 12px !important; }
        
        .frac-table { border-collapse: collapse; font-family: monospace; font-size: 1.2em; margin: 0 auto; text-align: right; }
        .frac-table td { padding: 4px 8px; border-bottom: 1px solid #eee; }
        .frac-int { color: var(--success); font-weight: bold; }
        
        .highlight { background-color: #fff3cd; padding: 4px 8px; border-radius: 4px; font-weight: bold; color: #d35400; display: inline-block; word-break: break-all; }
        
        .feedback-correct { color: var(--success); font-weight: bold; font-size: 1.3em; display: block; line-height:1.4;}
        .feedback-wrong { color: var(--accent); font-weight: bold; font-size: 1.3em; display: block; line-height:1.4;}
        
        .hex-guide {
            background: #fff8e1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 5px solid #ffc107;
            font-size: 0.9em;
            display: none;
            word-break: keep-all;
        }
        .hex-guide span { display: inline-block; background: #ffe082; padding: 3px 6px; border-radius: 4px; margin: 2px; font-weight: bold; color: #d35400; }
        
        .difficulty-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .diff-btn { flex: 1; min-width: 100px; padding: 10px 15px; border-radius: 20px; border: 2px solid #e0e6ed; background: white; cursor: pointer; font-weight: bold; color: var(--primary); transition: 0.2s; text-align: center; }
        .diff-btn.active { border-color: var(--primary); background: var(--primary); color: white; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .anim-step { opacity: 0; transform: translateY(15px); transition: all 0.3s ease-out; }
        .anim-step.visible { opacity: 1; transform: translateY(0); }
        tr.anim-step { transform: none; }
    </style>
</head>
<body>

<button id="langToggleBtn" class="lang-btn" onclick="toggleLanguage()">English</button>

<div class="main-container">
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('tab-convert')" data-ko="진법 변환" data-en="Convert">진법 변환</button>
        <button class="tab-btn" onclick="switchTab('tab-complement')" data-ko="보수 계산" data-en="Complement">보수 계산</button>
        <button class="tab-btn" onclick="switchTab('tab-quiz')" data-ko="실전 퀴즈" data-en="Quiz">실전 퀴즈</button>
    </div>

    <!-- 1. 진법 변환 탭 -->
    <div id="tab-convert" class="panel active">
        <h2 data-ko="진법 변환기" data-en="Base Converter">진법 변환기</h2>
        <div id="hexGuide" class="hex-guide">
            <b data-ko="16진수 참고:" data-en="Hex Guide:">16진수 참고:</b> 
            <span data-ko="10부터는 알파벳을 사용합니다." data-en="Use alphabets from 10.">10부터는 알파벳을 사용합니다.</span><br>
            <div style="margin-top:5px;">
                <span>A=10</span> <span>B=11</span> <span>C=12</span> 
                <span>D=13</span> <span>E=14</span> <span>F=15</span>
            </div>
        </div>
        
        <div class="input-group">
            <input type="text" id="calcInput" data-placeholder-ko="숫자 입력 (예: 10.11, 1F.A)" data-placeholder-en="Input (e.g., 10.11, 1F.A)" placeholder="숫자 입력 (예: 10.11, 1F.A)" oninput="validateConvertInput(this)">
        </div>
        
        <div class="base-select-group">
            <select id="calcFrom" onchange="checkHexGuide()">
                <option value="2" data-ko="2진수" data-en="Binary(2)">2진수</option>
                <option value="8" data-ko="8진수" data-en="Octal(8)">8진수</option>
                <option value="10" selected data-ko="10진수" data-en="Decimal(10)">10진수</option>
                <option value="16" data-ko="16진수" data-en="Hex(16)">16진수</option>
            </select>
            <div style="flex: 0 0 auto; font-weight:bold; color:#7f8c8d; font-size:12px;">▶</div>
            <select id="calcTo" onchange="checkHexGuide()">
                <option value="2" selected data-ko="2진수" data-en="Binary(2)">2진수</option>
                <option value="8" data-ko="8진수" data-en="Octal(8)">8진수</option>
                <option value="10" data-ko="10진수" data-en="Decimal(10)">10진수</option>
                <option value="16" data-ko="16진수" data-en="Hex(16)">16진수</option>
            </select>
        </div>
        
        <div class="action-group">
            <button class="btn-action" data-ko="풀이 애니메이션 보기" data-en="View Animation" onclick="runConversion()">풀이 애니메이션 보기</button>
            <button class="btn-random" data-ko="랜덤 생성" data-en="Random" onclick="randomConversion()">랜덤 생성</button>
        </div>

        <div id="calcResultWrapper" class="smooth-wrapper">
            <div class="smooth-inner">
                <div id="calcResult" class="result-box"></div>
            </div>
        </div>
        <div id="calcExplanationWrapper" class="smooth-wrapper">
            <div class="smooth-inner">
                <div id="calcExplanation" class="explanation-box"></div>
            </div>
        </div>
    </div>

    <!-- 2. 보수 계산 탭 -->
    <div id="tab-complement" class="panel">
        <h2 data-ko="보수 계산기" data-en="Complement Calculator">보수 계산기</h2>
        <p style="text-align:center; color:#7f8c8d; margin-top:-15px; margin-bottom: 20px; word-break:keep-all;" data-ko="원하는 진법의 보수(음수 표현)를 정확히 구합니다." data-en="Calculate complements for various bases correctly.">원하는 진법의 보수(음수 표현)를 정확히 구합니다.</p>
        
        <div class="base-select-group">
            <select id="compBase" onchange="updateCompInput()">
                <option value="2" selected data-ko="2진수" data-en="Binary(2)">2진수</option>
                <option value="8" data-ko="8진수" data-en="Octal(8)">8진수</option>
                <option value="10" data-ko="10진수" data-en="Decimal(10)">10진수</option>
                <option value="16" data-ko="16진수" data-en="Hex(16)">16진수</option>
            </select>
        </div>

        <div class="input-group" style="max-width: 450px; margin: 0 auto 15px auto;">
            <input type="text" id="compInput" placeholder="2진수 정수 입력" oninput="validateCompInput(this)">
        </div>
        
        <div class="action-group">
            <button class="btn-action" onclick="runComplement()" data-ko="보수 구하기" data-en="Calculate">보수 구하기</button>
            <button class="btn-random" onclick="randomComplement()" data-ko="랜덤 생성" data-en="Random">랜덤 생성</button>
        </div>

        <div id="compResultWrapper" class="smooth-wrapper">
            <div class="smooth-inner">
                <div id="compResult" class="result-box"></div>
            </div>
        </div>
        <div id="compExplanationWrapper" class="smooth-wrapper">
            <div class="smooth-inner">
                <div id="compExplanation" class="explanation-box"></div>
            </div>
        </div>
    </div>

    <!-- 3. 실전 퀴즈 탭 -->
    <div id="tab-quiz" class="panel">
        <h2 data-ko="실전 퀴즈 모드" data-en="Practice Quiz Mode">실전 퀴즈 모드</h2>
        <div class="difficulty-selector">
            <button id="diff-easy" class="diff-btn active" onclick="setDiff('easy')" data-ko="쉬움 모드" data-en="Easy Mode">쉬움 모드</button>
            <button id="diff-hard" class="diff-btn" onclick="setDiff('hard')" data-ko="어려움 모드" data-en="Hard Mode">어려움 모드</button>
        </div>
        
        <div class="single-action-group">
            <button class="btn-action" style="background-color: var(--primary);" data-ko="새로운 문제 받기" data-en="Get New Question" onclick="startQuiz()">새로운 문제 받기</button>
        </div>

        <div id="quizAreaWrapper" class="smooth-wrapper">
            <div class="smooth-inner">
                <div id="quizArea">
                    <div id="quizQuestion" style="font-size: 1.5em; text-align: center; background: #f1f2f6; padding: 25px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; word-break: break-all;"></div>
                    
                    <div class="action-group" style="margin-top: 0; max-width: 450px;">
                        <input type="text" id="quizAnswer" data-placeholder-ko="정답 입력" data-placeholder-en="Enter Answer" placeholder="정답 입력" oninput="this.value = this.value.toUpperCase()" style="border: 2px solid #e0e6ed; box-shadow: none;">
                        <button class="btn-action" style="flex: 1;" data-ko="채점하기" data-en="Submit" onclick="checkQuiz()">채점하기</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="quizResultWrapper" class="smooth-wrapper">
            <div class="smooth-inner">
                <div id="quizResult" style="text-align:center; padding: 15px; background: #ffffff; border-radius: 8px;"></div>
            </div>
        </div>

        <div id="quizExpAreaWrapper" class="smooth-wrapper">
            <div class="smooth-inner">
                <div id="quizExpArea" class="explanation-box"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentLang = 'ko';
    let animationTimers = [];
    let currentQuiz = {};
    let difficulty = 'easy';

    function T(koStr, enStr) { return currentLang === 'ko' ? koStr : enStr; }

    function resetExpansions() {
        document.querySelectorAll('.smooth-wrapper').forEach(el => el.classList.remove('expanded'));
    }

    function toggleLanguage() {
        currentLang = currentLang === 'ko' ? 'en' : 'ko';
        document.getElementById('langToggleBtn').innerText = currentLang === 'ko' ? 'English' : '한국어';
        document.querySelectorAll('[data-ko]').forEach(el => { el.innerHTML = el.getAttribute(`data-${currentLang}`); });
        document.querySelectorAll('[data-placeholder-ko]').forEach(el => { el.placeholder = el.getAttribute(`data-placeholder-${currentLang}`); });
        updateCompInput();
        resetExpansions();
        clearTimers();
    }

    function validateConvertInput(input) {
        input.value = input.value.toUpperCase();
        const base = parseInt(document.getElementById('calcFrom').value);
        const chars = "0123456789ABCDEF".substring(0, base) + ".";
        const regex = new RegExp(`[^${chars}]`, 'g');
        input.value = input.value.replace(regex, '');
    }

    function validateCompInput(input) {
        input.value = input.value.toUpperCase();
        const base = parseInt(document.getElementById('compBase').value);
        const chars = "0123456789ABCDEF".substring(0, base);
        const regex = new RegExp(`[^${chars}]`, 'g');
        input.value = input.value.replace(regex, '');
    }

    function updateCompInput() {
        const base = document.getElementById('compBase').value;
        const input = document.getElementById('compInput');
        input.value = '';
        input.placeholder = T(`${base}진수 정수 입력`, `Base ${base} Integer`);
    }

    function checkHexGuide() {
        document.getElementById('calcInput').value = '';
        const fromBase = document.getElementById('calcFrom').value;
        const toBase = document.getElementById('calcTo').value;
        const hexGuide = document.getElementById('hexGuide');
        if (fromBase === '16' || toBase === '16') { hexGuide.style.display = 'block'; } 
        else { hexGuide.style.display = 'none'; }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
        resetExpansions();
        clearTimers();
        if(tabId === 'tab-complement') updateCompInput();
    }

    function setDiff(val) {
        difficulty = val;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`diff-${val}`).classList.add('active');
    }

    function getRandomStr(base, intLen, fracLen = 0) {
        const chars = "0123456789ABCDEF".substring(0, base);
        let res = "";
        for (let i=0; i<intLen; i++) {
            let idx = Math.floor(Math.random() * chars.length);
            if (i===0 && chars[idx]==='0' && intLen > 1) idx = 1 + Math.floor(Math.random() * (chars.length-1));
            res += chars[idx];
        }
        if(fracLen > 0) {
            res += ".";
            for (let i=0; i<fracLen; i++) {
                res += chars[Math.floor(Math.random() * chars.length)];
            }
        }
        return res;
    }

    function clearTimers() {
        animationTimers.forEach(t => clearTimeout(t));
        animationTimers = [];
    }

    function playAnimations(containerId, onComplete) {
        const container = document.getElementById(containerId);
        const elements = container.querySelectorAll('.anim-step');
        if(elements.length === 0) { if(onComplete) onComplete(); return; }

        let currentDelay = 0;
        let totalElements = elements.length;
        let baseDelay = totalElements > 20 ? 100 : (totalElements > 10 ? 200 : 300);
        let trDelay = totalElements > 20 ? 60 : (totalElements > 10 ? 120 : 200);

        elements.forEach((el, index) => {
            let timer = setTimeout(() => {
                el.classList.add('visible');
                if (index === elements.length - 1 && onComplete) { setTimeout(onComplete, 300); }
            }, currentDelay);
            animationTimers.push(timer);

            let delay = (el.tagName === 'TR') ? trDelay : baseDelay;
            if (index > 6) delay *= 0.7;
            if (index > 12) delay *= 0.5;
            if (index > 20) delay *= 0.3;
            currentDelay += Math.max(delay, 20);
        });
    }

    // --- 진법 변환 로직 ---
    function randomConversion() {
        const fromBase = parseInt(document.getElementById('calcFrom').value);
        let hasFrac = Math.random() > 0.5;
        let iLen = Math.floor(Math.random() * 3) + 2;
        let fLen = hasFrac ? (Math.floor(Math.random() * 2) + 1) : 0;
        document.getElementById('calcInput').value = getRandomStr(fromBase, iLen, fLen);
    }

    function padFraction(str, size, padRight) {
        if(!str) return "";
        let padded = str;
        while (padded.length % size !== 0) padded = padRight ? padded + "0" : "0" + padded;
        return padded;
    }

    function getDirectConversionHTML(numStr, fromBase, toBase) {
        let bitSize = (fromBase === 16 || toBase === 16) ? 4 : 3;
        let parts = numStr.split('.');
        let intPart = parts[0];
        let fracPart = parts[1] || "";
        
        let html = `<div class="anim-step"><h3 style="color:#8e44ad; margin-top:0;">${T("지름길 방식 (다이렉트 변환)", "Shortcut Method (Direct Conversion)")}</h3>`;
        html += `<p style="word-break:keep-all;">${T(`2진수와 ${fromBase===2?toBase:fromBase}진수는 <b>2의 ${bitSize}승</b> 관계이므로, <b>${bitSize}자리씩 비트를 그룹화</b>하여 바로 변환할 수 있습니다.`, `Base 2 and Base ${fromBase===2?toBase:fromBase} have a <b>power of ${bitSize}</b> relationship, allowing direct conversion by <b>grouping bits by ${bitSize}</b>.`)}</p></div>`;

        let finalResult = "";

        if (fromBase === 2) {
            let paddedInt = padFraction(intPart, bitSize, false);
            let paddedFrac = padFraction(fracPart, bitSize, true);
            
            html += `<div class="anim-step direct-box">`;
            html += `<div style="text-align:center; word-break:keep-all;">${T(`1. 정수부는 뒤에서부터, 소수부는 앞에서부터 ${bitSize}자리씩 끊어줍니다.<br>(부족한 자리는 0으로 채움)`, `1. Group integer bits from right to left, and fractional bits from left to right by ${bitSize}.<br>(Pad with 0s)`)}</div>`;
            
            let intChunks = []; for (let i=0; i<paddedInt.length; i+=bitSize) intChunks.push(paddedInt.substring(i, i+bitSize));
            let fracChunks = []; for (let i=0; i<paddedFrac.length; i+=bitSize) fracChunks.push(paddedFrac.substring(i, i+bitSize));
            
            html += `<div class="bit-container">`;
            html += intChunks.map(c => `<span class="bit-group" style="background:#e8f6f3; border-color:#1abc9c; color:#16a085;">${c}</span>`).join("");
            if(fracChunks.length > 0) {
                html += `<span style="font-size:1.5em; font-weight:bold; align-self:center;">.</span>`;
                html += fracChunks.map(c => `<span class="bit-group" style="background:#fdf2e9; border-color:#f1c40f; color:#d35400;">${c}</span>`).join("");
            }
            html += `</div>`;
            
            html += `<div class="arrow-down">${T(`▼ 각 묶음을 ${toBase}진수로 변환 ▼`, `▼ Convert each group to Base ${toBase} ▼`)}</div>`;
            
            let resIntChunks = intChunks.map(c => parseInt(c, 2).toString(toBase).toUpperCase());
            let resFracChunks = fracChunks.map(c => parseInt(c, 2).toString(toBase).toUpperCase());
            
            html += `<div class="bit-container">`;
            html += resIntChunks.map(c => `<span class="bit-group">${c}</span>`).join("");
            if(resFracChunks.length > 0) {
                html += `<span style="font-size:1.5em; font-weight:bold; align-self:center;">.</span>`;
                html += resFracChunks.map(c => `<span class="bit-group">${c}</span>`).join("");
            }
            html += `</div></div>`;
            
            finalResult = resIntChunks.join("") + (resFracChunks.length > 0 ? "." + resFracChunks.join("") : "");
        } else {
            html += `<div class="anim-step direct-box">`;
            html += `<div style="text-align:center; word-break:keep-all;">${T(`1. ${fromBase}진수 각 자리를 독립적인 ${bitSize}자리 2진수로 쪼갭니다.`, `1. Split each Base ${fromBase} digit into a ${bitSize}-bit binary number.`)}</div>`;
            
            html += `<div class="bit-container">`;
            html += intPart.split('').map(c => `<span class="bit-group">${c}</span>`).join("");
            if(fracPart) {
                html += `<span style="font-size:1.5em; font-weight:bold; align-self:center;">.</span>`;
                html += fracPart.split('').map(c => `<span class="bit-group">${c}</span>`).join("");
            }
            html += `</div>`;
            html += `<div class="arrow-down">${T(`▼ 2진수 ${bitSize}자리로 변환 ▼`, `▼ Convert to ${bitSize}-bit binary ▼`)}</div>`;
            
            let resIntChunks = intPart.split('').map(c => padFraction(parseInt(c, fromBase).toString(2), bitSize, false));
            let resFracChunks = fracPart ? fracPart.split('').map(c => padFraction(parseInt(c, fromBase).toString(2), bitSize, false)) : [];
            
            html += `<div class="bit-container">`;
            html += resIntChunks.map(c => `<span class="bit-group" style="background:#e8f6f3; border-color:#1abc9c; color:#16a085;">${c}</span>`).join("");
            if(resFracChunks.length > 0) {
                html += `<span style="font-size:1.5em; font-weight:bold; align-self:center;">.</span>`;
                html += resFracChunks.map(c => `<span class="bit-group" style="background:#fdf2e9; border-color:#f1c40f; color:#d35400;">${c}</span>`).join("");
            }
            html += `</div></div>`;
            
            let finalInt = resIntChunks.join("").replace(/^0+/, ''); if(finalInt==="") finalInt="0";
            finalResult = finalInt + (resFracChunks.length > 0 ? "." + resFracChunks.join("") : "");
        }

        html += `<div class="anim-step"><p style="text-align:center; word-break:keep-all;">${T("그대로 이어 붙이면 완성!", "Concatenate them for the final result!")}</p></div>`;
        return { html, finalResult };
    }

    function getStandardConversionHTML(numStr, fromBase, toBase) {
        let html = ""; let finalResult = "";
        let parts = numStr.split('.');
        let intPart = parts[0] || "0"; let fracPart = parts[1] || "";
        let decValueInt = 0; let decValueFrac = 0;

        if (fromBase !== 10) {
            html += `<div class="anim-step"><div class="step-title">${T(`1단계: ${fromBase}진수 ➔ 10진수`, `Step 1: Base ${fromBase} ➔ Base 10`)}</div>`;
            html += `<p style="word-break:keep-all;">${T("각 자리에 가중치(거듭제곱)를 곱하여 모두 더합니다.", "Multiply each digit by its positional weight (power) and sum them up.")}</p>`;
            
            let sumStr = ""; let calcStr = "";
            for (let i = 0; i < intPart.length; i++) {
                let dVal = parseInt(intPart[i], fromBase); let power = intPart.length - 1 - i;
                let term = dVal * Math.pow(fromBase, power); decValueInt += term;
                let disp = (fromBase===16 && dVal>=10) ? `${intPart[i]}(${dVal})` : intPart[i];
                sumStr += `${disp} &times; ${fromBase}<sup>${power}</sup>` + (i < intPart.length-1 || fracPart ? " + " : "");
                calcStr += term + (i < intPart.length-1 || fracPart ? " + " : "");
            }
            for (let i = 0; i < fracPart.length; i++) {
                let dVal = parseInt(fracPart[i], fromBase); let power = -(i + 1);
                let term = dVal * Math.pow(fromBase, power); decValueFrac += term;
                let disp = (fromBase===16 && dVal>=10) ? `${fracPart[i]}(${dVal})` : fracPart[i];
                sumStr += `${disp} &times; ${fromBase}<sup>${power}</sup>` + (i < fracPart.length-1 ? " + " : "");
                calcStr += Number(term.toFixed(10)) + (i < fracPart.length-1 ? " + " : "");
            }
            let totalDec = decValueInt + decValueFrac;
            totalDec = Number(totalDec.toFixed(10));
            html += `<div class="highlight" style="line-height:1.6;">${T("계산식:", "Formula:")} ${sumStr}</div><p>➔ ${calcStr} = <strong>${totalDec}<sub>(10)</sub></strong></p></div>`;
            html += `<hr style="border:0; border-top:1px dashed #ccc; margin: 20px 0;">`;
        } else {
            decValueInt = parseInt(intPart, 10);
            decValueFrac = fracPart ? parseFloat("0." + fracPart) : 0;
        }

        if (toBase !== 10) {
            html += `<div class="anim-step"><div class="step-title">${fromBase !== 10 ? T('2단계: ', 'Step 2: ') : ''}${T(`10진수 ➔ ${toBase}진수`, `Base 10 ➔ Base ${toBase}`)}</div></div>`;
            
            let finalIntStr = "0";
            if (decValueInt > 0) {
                html += `<div class="anim-step"><p style="word-break:keep-all;">${T("[정수 부분] 몫이 0이 될 때까지 나누고, <strong>나머지를 역순(밑에서 위로)</strong>으로 읽습니다.", "[Integer Part] Divide until the quotient is 0, read <strong>remainders from bottom to top</strong>.")}</p></div>`;
                let temp = decValueInt; let steps = [];
                while (temp >= toBase) { steps.push({d: temp, r: temp % toBase}); temp = Math.floor(temp / toBase); }
                html += `<div class="anim-step table-responsive"><table class="math-table">`;
                for (let i = 0; i < steps.length; i++) {
                    html += `<tr class="anim-step"><td style="text-align:right;">${toBase}</td><td class="math-border">${steps[i].d}</td>`;
                    if(i===0) html += `<td></td></tr>`;
                    else {
                        let pr = steps[i-1].r.toString(16).toUpperCase();
                        let dsp = (toBase===16 && steps[i-1].r>=10) ? `${steps[i-1].r}➔${pr}` : pr;
                        html += `<td class="remainder">... ${dsp}</td></tr>`;
                    }
                }
                let lastR = steps.length>0 ? steps[steps.length-1].r.toString(16).toUpperCase() : "";
                if(toBase===16 && steps.length>0 && steps[steps.length-1].r>=10) lastR = `${steps[steps.length-1].r}➔` + lastR;
                let fQ = temp.toString(16).toUpperCase();
                html += `<tr class="anim-step"><td></td><td class="final-quotient">${fQ}</td>`;
                if(steps.length>0) html += `<td class="remainder">... ${lastR}</td>`;
                html += `</tr></table></div>`;
                
                finalIntStr = fQ + steps.map(s => s.r.toString(16).toUpperCase()).reverse().join('');
                html += `<div class="anim-step" style="text-align:center; margin:10px 0;"><span class="highlight">${T("정수부 결과: ", "Integer Result: ")} ${finalIntStr}</span></div>`;
            } else {
                html += `<div class="anim-step"><span class="highlight">${T("정수부 결과: 0", "Integer Result: 0")}</span></div>`;
            }

            let finalFracStr = "";
            if (decValueFrac > 0) {
                html += `<div class="anim-step" style="margin-top:20px;"><p style="word-break:keep-all;">${T("[소수 부분] 소수부가 0이 될 때까지 계속 곱하고, <strong>정수 부분을 위에서 아래로(정방향)</strong> 읽습니다. (최대 5자리)", "[Fractional Part] Multiply by base, read <strong>integer parts top to bottom</strong>. (Max 5 digits)")}</p></div>`;
                html += `<div class="anim-step table-responsive"><table class="frac-table">`;
                
                let tempF = decValueFrac; let limit = 5;
                while (tempF > 0 && limit > 0) {
                    let mul = Number((tempF * toBase).toFixed(10));
                    let bit = Math.floor(mul);
                    let bitStr = bit.toString(16).toUpperCase();
                    let dspBit = (toBase===16 && bit>=10) ? `${bit}➔${bitStr}` : bitStr;
                    
                    html += `<tr class="anim-step"><td>${tempF} &times; ${toBase} = </td><td class="frac-int">${dspBit}</td><td>. ${Number((mul - bit).toFixed(10)).toString().split('.')[1] || "0"}</td></tr>`;
                    finalFracStr += bitStr;
                    tempF = Number((mul - bit).toFixed(10));
                    limit--;
                }
                html += `</table></div>`;
                html += `<div class="anim-step" style="text-align:center; margin:10px 0;"><span class="highlight">${T("소수부 결과: ", "Fractional Result: ")} 0.${finalFracStr}</span></div>`;
            }

            finalResult = finalIntStr + (finalFracStr ? "." + finalFracStr : "");
        } else {
            let t = Number((decValueInt + decValueFrac).toFixed(10));
            finalResult = t.toString();
        }
        return { html, finalResult };
    }

    function runConversion() {
        const numStr = document.getElementById('calcInput').value.trim();
        const fromBase = parseInt(document.getElementById('calcFrom').value);
        const toBase = parseInt(document.getElementById('calcTo').value);
        const expBox = document.getElementById('calcExplanation');
        const resBox = document.getElementById('calcResult');
        
        const expWrapper = document.getElementById('calcExplanationWrapper');
        const resWrapper = document.getElementById('calcResultWrapper');

        if (!numStr) return alert(T("숫자를 입력하세요.", "Please enter a number."));
        
        let chars = "0123456789ABCDEF".substring(0, fromBase);
        const validRegex = new RegExp(`^[${chars}]+(\\.[${chars}]+)?$`);
        if (!validRegex.test(numStr)) return alert(T(`올바른 ${fromBase}진수 숫자가 아니거나 소수점이 두 개 이상입니다.`, `Invalid Base ${fromBase} number format.`));

        clearTimers();
        resWrapper.classList.remove('expanded');
        expWrapper.classList.remove('expanded');
        resBox.style.display = 'none';

        let resultData;
        if (fromBase === toBase) {
            resultData = { html: `<div class="anim-step"><p>${T("동일한 진법입니다.", "Same base selected.")}</p></div>`, finalResult: numStr };
        } else if ((fromBase===2 && (toBase===8||toBase===16)) || ((fromBase===8||fromBase===16) && toBase===2)) {
            resultData = getDirectConversionHTML(numStr, fromBase, toBase);
        } else {
            resultData = getStandardConversionHTML(numStr, fromBase, toBase);
        }

        expBox.innerHTML = resultData.html;
        expWrapper.classList.add('expanded');

        playAnimations('calcExplanation', () => {
            resBox.innerHTML = `${T("최종 결과: ", "Final Result: ")}<span style="color:var(--accent);">${resultData.finalResult} <sub>(${toBase})</sub></span>`;
            resBox.style.display = "block";
            resWrapper.classList.add('expanded');
        });
    }

    // --- 보수 계산 로직 ---
    function randomComplement() { 
        const base = parseInt(document.getElementById('compBase').value);
        document.getElementById('compInput').value = getRandomStr(base, 4 + Math.floor(Math.random()*3)); 
    }

    function runComplement() {
        const base = parseInt(document.getElementById('compBase').value);
        const binStr = document.getElementById('compInput').value.trim().toUpperCase();
        const expBox = document.getElementById('compExplanation');
        const expWrapper = document.getElementById('compExplanationWrapper');
        const resBox = document.getElementById('compResult');
        const resWrapper = document.getElementById('compResultWrapper');

        if (!binStr) return alert(T("숫자를 입력하세요.", "Please enter a number."));
        
        let chars = "0123456789ABCDEF".substring(0, base);
        const regex = new RegExp(`^[${chars}]+$`);
        if (!regex.test(binStr)) return alert(T(`올바른 ${base}진수 정수를 입력하세요.`, `Please enter a valid Base ${base} integer.`));

        clearTimers();
        resWrapper.classList.remove('expanded');
        expWrapper.classList.remove('expanded');
        resBox.style.display = 'none';

        let rMinus1 = base - 1;
        let rMinus1Char = rMinus1.toString(16).toUpperCase();
        
        let name1 = `${rMinus1}${T("의 보수", "'s Comp")}`;
        if(base === 16) name1 = `15(F)${T("의 보수", "'s Comp")}`;
        let name2 = `${base}${T("의 보수", "'s Comp")}`;

        let html = `<h3 style="text-align:center; margin-top:0;">${T("보수 계산 과정", "Complement Calculation Steps")}</h3>`;
        
        let maxStr = binStr.split('').map(() => rMinus1Char).join('');
        let comp1Arr = binStr.split('').map(c => {
            let val = parseInt(c, base);
            return (rMinus1 - val).toString(16).toUpperCase();
        });
        let comp1Str = comp1Arr.join('');

        html += `<div class="anim-step"><div class="step-title">Step 1. ${name1} ${T("구하기 (각 자리수 빼기)", "Calculation (Subtract each digit)")}</div>
                 <p style="word-break:keep-all;">${T(`해당 진법의 가장 큰 숫자인 <b>${rMinus1Char}</b>에서 각 자리의 숫자를 뺍니다.`, `Subtract each digit from the maximum digit <b>${rMinus1Char}</b>.`)}</p>
                 <div class="table-responsive"><table class="data-table">
                 <tr><th>${T("최대값", "Max Value")}</th><td style="letter-spacing:3px; word-break:break-all;">${maxStr.split('').join(' ')}</td></tr>
                 <tr><th>${T("입력값 빼기", "Subtract Input")}</th><td style="letter-spacing:3px; word-break:break-all;">- ${binStr.split('').join(' ')}</td></tr>
                 <tr><th>${name1}</th><td class="highlight-text" style="color:#e67e22; letter-spacing:3px; word-break:break-all;">${comp1Str.split('').join(' ')}</td></tr>
                 </table></div></div>`;

        let comp2Arr = comp1Str.split(''); let carry = 1;
        for (let i = comp2Arr.length - 1; i >= 0; i--) {
            let val = parseInt(comp2Arr[i], base) + carry;
            if (val >= base) { comp2Arr[i] = (val - base).toString(16).toUpperCase(); carry = 1; } 
            else { comp2Arr[i] = val.toString(16).toUpperCase(); carry = 0; }
        }
        let comp2Str = comp2Arr.join('');
        let carryHtml = carry ? `<div style="font-size:0.8em; color:var(--accent);">${T("(오버플로우 버림)", "(Discard Overflow)")}</div>` : "";

        html += `<div class="anim-step"><div class="step-title">Step 2. ${name2} ${T("구하기 (1 더하기)", "Calculation (Add 1)")}</div>
                 <p style="word-break:keep-all;">${T(`구해진 ${name1}의 맨 끝자리에 <b>1</b>을 더합니다.`, `Add <b>1</b> to the least significant digit of the ${name1}.`)}</p>
                 <div style="font-family:monospace; font-size:1.3em; text-align:center; background:#fff; padding:20px; border-radius:8px; border:1px solid #ccc; width:100%; max-width:300px; margin:0 auto; overflow-x:auto;">
                 <div style="letter-spacing:5px;">&nbsp;&nbsp;${comp1Str}</div>
                 <div style="letter-spacing:5px; border-bottom:2px solid #333; padding-bottom:5px;">+&nbsp;&nbsp;&nbsp;&nbsp;1</div>
                 <div style="letter-spacing:5px; margin-top:10px; color:var(--success); font-weight:bold;">= ${comp2Str}</div>${carryHtml}</div></div>`;

        expBox.innerHTML = html;
        expWrapper.classList.add('expanded');

        playAnimations('compExplanation', () => {
            resBox.innerHTML = `${T(`최종 결과 (${name2}): `, `Final Result (${name2}): `)}<span style="color:var(--accent);">${comp2Str}</span>`;
            resBox.style.display = "block";
            resWrapper.classList.add('expanded');
        });
    }

    // --- 퀴즈 로직 ---
    function startQuiz() {
        const bases = [2, 8, 10, 16];
        let fromBase, toBase;

        if (difficulty === 'hard' && Math.random() > 0.4) {
            fromBase = 2; toBase = Math.random() > 0.5 ? 8 : 16;
            if (Math.random() > 0.5) { let temp = fromBase; fromBase = toBase; toBase = temp; }
        } else {
            fromBase = bases[Math.floor(Math.random() * 4)];
            toBase = bases[Math.floor(Math.random() * 4)];
            while(fromBase === toBase) toBase = bases[Math.floor(Math.random() * 4)];
        }
        
        let intLen, fracLen;
        if (difficulty === 'easy') {
            intLen = (fromBase === 2) ? Math.floor(Math.random() * 3) + 3 : Math.floor(Math.random() * 2) + 2;
            fracLen = 0; 
        } else {
            intLen = (fromBase === 2) ? Math.floor(Math.random() * 4) + 4 : Math.floor(Math.random() * 3) + 2;
            fracLen = (Math.random() > 0.5) ? (fromBase === 2 ? 2 : 1) : 0; 
        }

        let numStr = getRandomStr(fromBase, intLen, fracLen);
        let ansData;
        if ((fromBase===2 && (toBase===8||toBase===16)) || ((fromBase===8||fromBase===16) && toBase===2)) {
            ansData = getDirectConversionHTML(numStr, fromBase, toBase);
        } else {
            ansData = getStandardConversionHTML(numStr, fromBase, toBase);
        }

        currentQuiz = { q: numStr, from: fromBase, to: toBase, ans: ansData.finalResult, html: ansData.html };

        document.getElementById('quizAreaWrapper').classList.add('expanded');
        document.getElementById('quizQuestion').innerHTML = `<span style="color:#7f8c8d; font-size:0.7em;">${T(`${fromBase}진수를 ${toBase}진수로 변환하세요.`, `Convert Base ${fromBase} to Base ${toBase}.`)}</span><br><br><span style="font-size:1.3em;">${numStr} <sub>(${fromBase})</sub> &rarr; ? <sub>(${toBase})</sub></span>`;
        document.getElementById('quizAnswer').value = '';
        
        document.getElementById('quizResultWrapper').classList.remove('expanded');
        document.getElementById('quizExpAreaWrapper').classList.remove('expanded');
    }

    function checkQuiz() {
        const user = document.getElementById('quizAnswer').value.trim().toUpperCase();
        if(!user) return alert(T("정답을 입력하세요.", "Please enter an answer."));

        const resDiv = document.getElementById('quizResult');
        const expDiv = document.getElementById('quizExpArea');
        const resWrapper = document.getElementById('quizResultWrapper');
        const expWrapper = document.getElementById('quizExpAreaWrapper');

        if(user === currentQuiz.ans) {
            resDiv.innerHTML = `<span class="feedback-correct">${T("정답입니다! 완벽해요!", "Correct! Perfect!")}</span>`;
            expDiv.innerHTML = `<h3 style="color:var(--success); margin-top:0; border-bottom:2px solid #e0e6ed; padding-bottom:10px;">${T("상세 풀이 과정", "Step-by-Step Solution")}</h3>` + currentQuiz.html;
            resWrapper.classList.add('expanded');
            expWrapper.classList.add('expanded');
            
            expDiv.querySelectorAll('.anim-step').forEach(el => el.classList.add('visible'));
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 1000 });
        } else {
            resDiv.innerHTML = `<span class="feedback-wrong">${T("오답입니다.", "Incorrect.")}</span><br><span style="font-size:1.1em; margin-top:5px; display:inline-block;">${T("정답은", "The answer is")} <b>${currentQuiz.ans}</b></span>`;
            expDiv.innerHTML = `<h3 style="color:#c0392b; margin-top:0; border-bottom:2px solid #e0e6ed; padding-bottom:10px;">${T("오답 풀이 확인", "Review Solution")}</h3>` + currentQuiz.html;
            resWrapper.classList.add('expanded');
            expWrapper.classList.add('expanded');
            
            expDiv.querySelectorAll('.anim-step').forEach(el => el.classList.add('visible'));
        }
    }
</script>
