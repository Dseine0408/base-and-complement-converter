<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base & Complement Converter</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
            --success: #27ae60;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 60px 20px 40px 20px;
            margin: 0;
            position: relative;
        }

        .lang-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: 0.2s;
        }

        .main-container {
            width: 100%;
            max-width: 800px;
        }

        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            background-color: #e0e6ed;
            color: var(--primary);
            border: none;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab-btn.active {
            background-color: var(--card-bg);
            color: var(--secondary);
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
            border-top: 4px solid var(--secondary);
        }

        .panel {
            background-color: var(--card-bg);
            padding: 35px;
            border-radius: 0 12px 12px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        .panel.active {
            display: block;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
            justify-content: center;
        }
        input, select, button {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            outline: none;
        }
        input[type="text"] {
            flex-grow: 1;
            font-weight: bold;
            font-size: 1.2em;
            letter-spacing: 2px;
            text-align: center;
        }
        
        .btn-action {
            background-color: var(--secondary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            flex: 2;
        }
        .btn-random {
            background-color: #f39c12;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: linear-gradient(135deg, #e8f6f3, #d1f2eb);
            border-radius: 10px;
            font-size: 1.4em;
            text-align: center;
            font-weight: bold;
            color: #117864;
            display: none;
        }

        .explanation-box {
            margin-top: 25px;
            padding: 25px;
            background-color: #fafbfc;
            border: 1px solid #dcdde1;
            border-radius: 12px;
            display: none;
            line-height: 1.7;
        }

        .step-title {
            color: #2980b9;
            margin-top: 20px;
            margin-bottom: 10px;
            background-color: #eaf2f8;
            padding: 8px 12px;
            border-radius: 6px;
            display: inline-block;
            font-weight: bold;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            text-align: center;
            background: white;
        }
        .data-table th, .data-table td {
            border: 1px solid #dcdde1;
            padding: 10px;
        }
        .data-table th { background-color: #f1f2f6; }

        .direct-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            font-size: 1.3em;
            font-family: monospace;
        }
        .bit-group {
            display: inline-block;
            padding: 10px 15px;
            margin: 0 5px;
            background: #fff3cd;
            border: 2px solid #f1c40f;
            border-radius: 8px;
            font-weight: bold;
        }

        .math-table { border-collapse: collapse; font-family: monospace; font-size: 1.3em; margin: 0 auto; }
        .math-table td { padding: 5px 8px; }
        .math-border { border-left: 2px solid var(--primary); border-bottom: 2px solid var(--primary); text-align: right; padding-right: 15px; width: 60px; }
        .remainder { color: var(--accent); font-weight: bold; }
        .final-quotient { color: var(--success); font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .anim-step { opacity: 0; transform: translateY(15px); transition: all 0.5s ease-out; }
        .anim-step.visible { opacity: 1; transform: translateY(0); }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .diff-btn {
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid #ddd;
            background: white;
            cursor: pointer;
            font-weight: bold;
        }
        .diff-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        .hex-guide {
            background: #fff8e1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #ffc107;
            font-size: 0.95em;
            display: none;
        }
    </style>
</head>
<body>

<button id="langToggleBtn" class="lang-btn" onclick="toggleLanguage()">English</button>

<div class="main-container">
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('tab-convert')" data-ko="진법 변환" data-en="Base Convert">진법 변환</button>
        <button class="tab-btn" onclick="switchTab('tab-complement')" data-ko="보수 계산" data-en="Complement">보수 계산</button>
        <button class="tab-btn" onclick="switchTab('tab-quiz')" data-ko="실전 퀴즈" data-en="Quiz">실전 퀴즈</button>
    </div>

    <div id="tab-convert" class="panel active">
        <h2 data-ko="진법 및 보수 변환기" data-en="Base & Complement Converter">진법 및 보수 변환기</h2>
        <div id="hexGuide" class="hex-guide">
            <b data-ko="16진수 참고:" data-en="Hex Guide:">16진수 참고:</b> 
            <span data-ko="10부터는 알파벳을 사용합니다." data-en="Use alphabets from 10.">10부터는 알파벳을 사용합니다.</span><br>
            <span>A=10 B=11 C=12 D=13 E=14 F=15</span>
        </div>
        <div class="input-group">
            <input type="text" id="calcInput" data-placeholder-ko="숫자 입력 (예: 1011, 1F)" data-placeholder-en="Input (e.g., 1011, 1F)" placeholder="숫자 입력" oninput="this.value = this.value.toUpperCase()">
        </div>
        <div class="input-group">
            <select id="calcFrom" onchange="checkHexGuide()">
                <option value="2">2진수</option><option value="8">8진수</option><option value="10" selected>10진수</option><option value="16">16진수</option>
            </select>
            <span>▶</span>
            <select id="calcTo" onchange="checkHexGuide()">
                <option value="2" selected>2진수</option><option value="8">8진수</option><option value="10">10진수</option><option value="16">16진수</option>
            </select>
        </div>
        <div class="input-group">
            <button class="btn-action" data-ko="풀이 애니메이션 보기" data-en="View Animation" onclick="runConversion()">풀이 애니메이션 보기</button>
            <button class="btn-random" data-ko="랜덤 생성" data-en="Random" onclick="randomConversion()">랜덤 생성</button>
        </div>
        <div id="calcResult" class="result-box"></div>
        <div id="calcExplanation" class="explanation-box"></div>
    </div>

    <div id="tab-complement" class="panel">
        <h2 data-ko="보수 계산기" data-en="Complement Calculator">보수 계산기</h2>
        <div class="input-group"><input type="text" id="compInput" placeholder="2진수 입력" oninput="this.value = this.value.replace(/[^01]/g, '')"></div>
        <div class="input-group">
            <button class="btn-action" onclick="runComplement()" data-ko="계산" data-en="Calculate">계산</button>
            <button class="btn-random" onclick="randomComplement()" data-ko="랜덤" data-en="Random">랜덤</button>
        </div>
        <div id="compExplanation" class="explanation-box"></div>
    </div>

    <div id="tab-quiz" class="panel">
        <h2 data-ko="실전 퀴즈" data-en="Quiz Mode">실전 퀴즈</h2>
        <div class="difficulty-selector">
            <button id="diff-easy" class="diff-btn active" onclick="setDiff('easy')" data-ko="쉬움" data-en="Easy">쉬움</button>
            <button id="diff-hard" class="diff-btn" onclick="setDiff('hard')" data-ko="어려움" data-en="Hard">어려움</button>
        </div>
        <div style="text-align: center;"><button class="btn-action" onclick="startQuiz()" data-ko="새로운 문제" data-en="New Question">새로운 문제</button></div>
        <div id="quizArea" style="display: none; margin-top: 25px;">
            <div id="quizQuestion" style="font-size: 1.4em; text-align: center; background: #f1f2f6; padding: 20px; border-radius: 8px; font-weight: bold;"></div>
            <div class="input-group" style="margin-top: 15px;">
                <input type="text" id="quizAnswer" placeholder="정답 입력" oninput="this.value = this.value.toUpperCase()">
                <button class="btn-action" onclick="checkQuiz()" data-ko="채점" data-en="Submit">채점</button>
            </div>
            <div id="quizResult" style="text-align:center; margin-top:15px;"></div>
            <div id="quizExpArea" class="explanation-box"></div>
        </div>
    </div>
</div>

<script>
    let currentLang = 'ko';
    let animationTimers = [];
    let currentQuiz = {};
    let difficulty = 'easy';

    function T(ko, en) { return currentLang === 'ko' ? ko : en; }

    function toggleLanguage() {
        currentLang = currentLang === 'ko' ? 'en' : 'ko';
        document.getElementById('langToggleBtn').innerText = currentLang === 'ko' ? 'English' : '한국어';
        document.querySelectorAll('[data-ko]').forEach(el => el.innerHTML = el.getAttribute(`data-${currentLang}`));
        document.getElementById('quizArea').style.display = 'none';
        clearTimers();
    }

    function switchTab(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    function setDiff(val) {
        difficulty = val;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`diff-${val}`).classList.add('active');
    }

    function clearTimers() { animationTimers.forEach(t => clearTimeout(t)); animationTimers = []; }

    function playAnimations(containerId, onComplete) {
        const container = document.getElementById(containerId);
        const elements = container.querySelectorAll('.anim-step');
        let delay = 0;
        elements.forEach((el, index) => {
            let t = setTimeout(() => {
                el.classList.add('visible');
                if (index === elements.length - 1 && onComplete) setTimeout(onComplete, 400);
            }, delay);
            animationTimers.push(t);
            delay += (el.tagName === 'TR') ? 250 : 450;
        });
    }

    function runConversion() {
        const num = document.getElementById('calcInput').value.trim();
        const from = parseInt(document.getElementById('calcFrom').value);
        const to = parseInt(document.getElementById('calcTo').value);
        const exp = document.getElementById('calcExplanation');
        const res = document.getElementById('calcResult');
        if(!num) return;
        clearTimers();
        res.style.display = 'none'; exp.style.display = 'block';
        let data = (from===to) ? {html: `<p>Same base.</p>`, finalResult: num} : 
                   (((from===2&&(to===8||to===16))||((from===8||from===16)&&to===2))) ? getDirectHTML(num, from, to) : getStandardHTML(num, from, to);
        exp.innerHTML = data.html;
        playAnimations('calcExplanation', () => {
            res.innerHTML = `${T("최종 결과: ", "Result: ")} ${data.finalResult} (${to})`;
            res.style.display = 'block';
        });
    }

    function getDirectHTML(num, from, to) {
        let size = (from===16||to===16) ? 4 : 3;
        let html = `<div class="anim-step"><h3>${T("지름길 방식", "Shortcut Method")}</h3><p>${T("비트를 그룹화하여 직접 변환합니다.", "Convert directly by grouping bits.")}</p></div>`;
        let result = "";
        if(from===2) {
            let p = num; while(p.length%size!==0) p = "0"+p;
            let chunks = []; for(let i=0; i<p.length; i+=size) chunks.push(p.substring(i, i+size));
            html += `<div class="anim-step direct-box"><div>` + chunks.map(c => `<span class="bit-group">${c}</span>`).join(" ") + `</div><div style="margin:10px">▼</div>`;
            let resC = chunks.map(c => parseInt(c, 2).toString(to).toUpperCase());
            html += `<div>` + resC.map(c => `<span class="bit-group" style="background:#d1f2eb">${c}</span>`).join(" ") + `</div></div>`;
            result = resC.join("");
        } else {
            let resC = num.split('').map(c => { let b = parseInt(c, from).toString(2); while(b.length<size) b="0"+b; return b; });
            html += `<div class="anim-step direct-box"><div>` + num.split('').map(c => `<span class="bit-group">${c}</span>`).join(" ") + `</div><div style="margin:10px">▼</div>`;
            html += `<div>` + resC.map(c => `<span class="bit-group" style="background:#d1f2eb">${c}</span>`).join(" ") + `</div></div>`;
            result = resC.join("").replace(/^0+/, '') || "0";
        }
        return {html, finalResult: result};
    }

    function getStandardHTML(num, from, to) {
        let dec = 0, html = "", res = "";
        if(from!==10) {
            html += `<div class="anim-step"><div class="step-title">Step 1: ${from} ➔ 10</div>`;
            let len = num.length, sumS = "", calcS = "";
            for(let i=0; i<len; i++) {
                let d = parseInt(num[i], from), p = len-1-i, v = d * Math.pow(from, p); dec += v;
                sumS += `${num[i]}&times;${from}<sup>${p}</sup>` + (i<len-1?" + ":"");
            }
            html += `<p class="highlight">${sumS}</p><p>= ${dec}</p></div>`;
        } else dec = parseInt(num, 10);
        if(to!==10) {
            html += `<div class="anim-step"><div class="step-title">Step 2: 10 ➔ ${to}</div>`;
            let t = dec, steps = []; while(t>=to) { steps.push({d:t, r:t%to}); t = Math.floor(t/to); }
            html += `<table class="math-table">`;
            steps.forEach(s => html += `<tr><td>${to}</td><td class="math-border">${s.d}</td><td class="remainder">... ${s.r.toString(16).toUpperCase()}</td></tr>`);
            let fQ = t.toString(16).toUpperCase();
            html += `<tr><td></td><td class="final-quotient">${fQ}</td><td></td></tr></table></div>`;
            res = fQ + steps.map(s => s.r.toString(16).toUpperCase()).reverse().join('');
        } else res = dec.toString();
        return {html, finalResult: res};
    }

    function startQuiz() {
        const bs = [2, 8, 10, 16];
        let f = bs[Math.floor(Math.random()*4)], t = bs[Math.floor(Math.random()*4)];
        while(f===t) t = bs[Math.floor(Math.random()*4)];
        let len = (difficulty==='easy') ? (f===2?4:2) : (f===2?8:4);
        let n = getRandomStr(f, len);
        let data = ((((f===2&&(t===8||t===16))||((f===8||f===16)&&t===2)))) ? getDirectHTML(n, f, t) : getStandardHTML(n, f, t);
        currentQuiz = { q: n, f, t, a: data.finalResult, h: data.html };
        document.getElementById('quizArea').style.display = 'block';
        document.getElementById('quizQuestion').innerHTML = `${n} (${f}) ➔ ? (${t})`;
        document.getElementById('quizAnswer').value = '';
        document.getElementById('quizResult').innerHTML = '';
        document.getElementById('quizExpArea').style.display = 'none';
    }

    function checkQuiz() {
        const u = document.getElementById('quizAnswer').value.trim().toUpperCase();
        const rDiv = document.getElementById('quizResult');
        const eDiv = document.getElementById('quizExpArea');
        eDiv.style.display = 'block';
        eDiv.innerHTML = `<h3 style="margin-top:0">${T("상세 풀이 과정", "Step-by-Step Solution")}</h3>` + currentQuiz.h.replace(/anim-step/g, 'visible');
        if(u === currentQuiz.a) {
            rDiv.innerHTML = `<span style="color:var(--success); font-size:1.5em; font-weight:bold;">O ${T("정답입니다!", "Correct!")}</span>`;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            rDiv.innerHTML = `<span style="color:var(--accent); font-size:1.5em; font-weight:bold;">X ${T("오답입니다", "Incorrect")}</span><br>${T("정답은", "The answer is")} <b>${currentQuiz.a}</b>`;
        }
    }

    function getRandomStr(b, l) {
        const c = "0123456789ABCDEF".substring(0, b);
        let r = ""; for(let i=0; i<l; i++) {
            let idx = Math.floor(Math.random()*c.length);
            if(i===0 && c[idx]==='0') idx = 1 + Math.floor(Math.random()*(c.length-1));
            r += c[idx];
        } return r;
    }

    function runComplement() {
        const bin = document.getElementById('compInput').value.trim();
        const exp = document.getElementById('compExplanation');
        if(!bin) return;
        clearTimers(); exp.style.display = 'block';
        let ones = bin.split('').map(c => c==='0'?'1':'0').join('');
        let tA = ones.split(''), carry = 1;
        for(let i=tA.length-1; i>=0; i--) { if(tA[i]==='1'&&carry===1) {tA[i]='0';} else if(tA[i]==='0'&&carry===1) {tA[i]='1'; carry=0;} }
        let twos = tA.join('');
        exp.innerHTML = `<div class="anim-step"><div class="step-title">1's Comp</div><p>${ones}</p></div>
                         <div class="anim-step"><div class="step-title">2's Comp (1's + 1)</div><p>${twos}</p></div>`;
        playAnimations('compExplanation');
    }

    function randomComplement() { document.getElementById('compInput').value = getRandomStr(2, 4); }
    function checkHexGuide() {
        const f = document.getElementById('calcFrom').value, t = document.getElementById('calcTo').value;
        document.getElementById('hexGuide').style.display = (f==='16'||t==='16') ? 'block' : 'none';
    }
</script>
</body>
</html>
